name: Metrics

on:
  schedule:
    - cron: "0 18 * * *" # JST 03:00
  workflow_dispatch:
  push:
    branches: [main]
    paths: [".github/workflows/metrics.yml"]

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Repository card - sukisuki-club-portal
        uses: lowlighter/metrics@latest
        with:
          # METRICS_TOKEN(classic PAT, public_repo + read:org)を推奨。
          # 未設定の間は GITHUB_TOKEN でフォールバック(取得できる情報が一部制限される)
          token: ${{ secrets.METRICS_TOKEN || github.token }}
          user: Suki-Suki-Club
          repo: sukisuki-club-portal
          template: repository
          filename: repo-sukisuki-club-portal.svg
          config_timezone: Asia/Tokyo

      - name: Repository card - link-like-essentials-mypick
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || github.token }}
          user: Suki-Suki-Club
          repo: link-like-essentials-mypick
          template: repository
          filename: repo-link-like-essentials-mypick.svg
          config_timezone: Asia/Tokyo

      - name: Repository card - link-like-essentials-frontend
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || github.token }}
          user: Suki-Suki-Club
          repo: link-like-essentials-frontend
          template: repository
          filename: repo-link-like-essentials-frontend.svg
          config_timezone: Asia/Tokyo

      - name: Repository card - link-like-essentials-backend
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || github.token }}
          user: Suki-Suki-Club
          repo: link-like-essentials-backend
          template: repository
          filename: repo-link-like-essentials-backend.svg
          config_timezone: Asia/Tokyo

      - name: Repository card - link-like-essentials-functions
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || github.token }}
          user: Suki-Suki-Club
          repo: link-like-essentials-functions
          template: repository
          filename: repo-link-like-essentials-functions.svg
          config_timezone: Asia/Tokyo
